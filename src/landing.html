<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>x402 facilitator dashboard</title>
<style>
:root {
    color-scheme: dark;
    --bg-body: #010101;
    --bg-shell: rgba(6, 6, 6, 0.85);
    --bg-panel: rgba(12, 12, 12, 0.78);
    --border: #1a1a1a;
    --border-subtle: #121212;
    --text-main: #fafafa;
    --text-muted: #8a8a8a;
    --accent-online: #3ef57a;
    --accent-error: #ff5f73;
    --accent-warn: #ffd966;
}

*,
*::before,
*::after {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-body);
    color: var(--text-main);
    font-family: "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
    display: flex;
    flex-direction: column;
    position: relative;
    align-items: center;
    justify-content: flex-start;
    padding: clamp(28px, 6vw, 72px);
    gap: clamp(28px, 4vw, 48px);
}

canvas[data-role="bg-canvas"] {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: -1;
    display: block;
    filter: saturate(1.2) brightness(0.85);
}

a {
    color: inherit;
    text-decoration: none;
}

a:hover,
a:focus {
    text-decoration: underline;
}

.dashboard {
    width: min(1100px, calc(100% - 32px));
    min-height: 0;
    background: rgba(3, 9, 5, 0.72);
    border: 1px solid rgba(62, 245, 122, 0.18);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px) saturate(145%);
    -webkit-backdrop-filter: blur(20px) saturate(145%);
}

@supports not (backdrop-filter: blur(1px)) {
    .dashboard {
        background: rgba(8, 16, 10, 0.92);
    }
}

.dashboard::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(140deg, rgba(22, 54, 30, 0.22), rgba(6, 14, 9, 0.78));
    mix-blend-mode: screen;
    opacity: 0.85;
    pointer-events: none;
    z-index: 0;
}

.dashboard__container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
}

.dashboard__header {
    padding: 24px clamp(18px, 4vw, 32px);
    border-bottom: 1px solid rgba(62, 245, 122, 0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    background: linear-gradient(180deg, rgba(10, 22, 14, 0.72), rgba(4, 9, 6, 0.35));
}

.header__identity {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 200px;
}

.header__eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 0.72rem;
    color: var(--text-muted);
}

.header__title {
    margin: 0;
    font-size: clamp(1.4rem, 3vw, 2rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
}

.status-indicator {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border: 1px solid rgba(62, 245, 122, 0.18);
    background: rgba(5, 16, 9, 0.6);
    min-width: 200px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 0.78rem;
    border-radius: 999px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

.status-indicator__dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: var(--text-muted);
    box-shadow: none;
}

.status-indicator[data-phase="ready"] .status-indicator__dot {
    background: var(--accent-online);
    box-shadow: 0 0 18px rgba(62, 245, 122, 0.55);
}

.status-indicator[data-phase="error"] .status-indicator__dot {
    background: var(--accent-error);
    box-shadow: 0 0 12px rgba(255, 95, 115, 0.4);
}

.status-indicator[data-phase="loading"] .status-indicator__dot {
    animation: pulse 1.3s infinite ease-in-out;
    background: var(--text-muted);
}

@keyframes pulse {
    0%,
    100% {
        box-shadow: 0 0 0 rgba(255, 255, 255, 0.15);
    }
    50% {
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }
}

.status-indicator__meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.status-indicator__label {
    font-size: 0.78rem;
}

.status-indicator__time {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
}

.dashboard__body {
    padding: clamp(24px, 5vw, 44px);
    position: relative;
    border-radius: 22px;
    overflow: hidden;
}

.dashboard__body::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 22px;
    background: linear-gradient(155deg, rgba(9, 24, 13, 0.75), rgba(5, 10, 6, 0.6));
    border: 1px solid rgba(62, 245, 122, 0.12);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: -1;
    pointer-events: none;
}

.dashboard__content {
    display: grid;
    gap: clamp(18px, 3vw, 28px);
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

.panel {
    position: relative;
    z-index: 0;
    background: rgba(5, 16, 9, 0.72);
    border: 1px solid rgba(62, 245, 122, 0.16);
    border-radius: 18px;
    padding: 22px clamp(18px, 3vw, 28px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 160px;
    box-shadow: 0 18px 38px rgba(0, 0, 0, 0.35);
    overflow: hidden;
}

.panel::before {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: inherit;
    border: 1px solid rgba(62, 245, 122, 0.08);
    background: linear-gradient(160deg, rgba(12, 36, 18, 0.42), rgba(5, 12, 7, 0.85));
    z-index: 0;
    pointer-events: none;
}

.panel__title {
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    font-size: 0.76rem;
    color: rgba(155, 255, 191, 0.72);
}

.panel__content {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    font-size: 0.88rem;
}

.row__key {
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.7rem;
    white-space: nowrap;
    flex-shrink: 0;
}

.row__value {
    flex: 1;
    text-align: right;
}

.row--stacked {
    flex-direction: column;
    align-items: flex-start;
}

.row--stacked .row__value {
    text-align: left;
    color: var(--text-main);
    font-weight: 500;
}

.row__meta {
    margin-top: 4px;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
}

.message {
    margin: 0;
    font-size: 0.82rem;
    color: var(--text-muted);
}

.dashboard__footer {
    border-top: 1px solid rgba(62, 245, 122, 0.12);
    padding: 18px clamp(18px, 4vw, 32px);
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: linear-gradient(0deg, rgba(6, 14, 8, 0.6), rgba(4, 9, 5, 0.4));
}

@media (max-width: 640px) {
    body {
        padding: 16px;
        align-items: stretch;
        gap: 16px;
    }

    .dashboard {
        width: 100%;
        border-radius: 20px;
    }

    .dashboard__body {
        padding: 20px;
        border-radius: 16px;
    }

    .dashboard__body::before {
        border-radius: 14px;
    }

    .dashboard__content {
        gap: 16px;
    }

    .dashboard__header {
        flex-direction: column;
        align-items: flex-start;
    }

    .status-indicator {
        width: 100%;
        justify-content: space-between;
    }

    .row {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
    }

    .row__value {
        text-align: left;
    }
}
</style>
</head>
<body>
<div class="dashboard">
    <div class="dashboard__container">
    <header class="dashboard__header">
        <div class="header__identity">
            <span class="header__eyebrow">daydreams.systems</span>
            <h1 class="header__title">Daydreams</h1>
        </div>
        <div class="status-indicator" data-role="status-indicator" data-phase="loading">
            <span class="status-indicator__dot" aria-hidden="true"></span>
            <div class="status-indicator__meta">
                <span class="status-indicator__label" data-role="status-label">loading</span>
                <span class="status-indicator__time" data-role="status-time">—</span>
            </div>
        </div>
    </header>
    <main class="dashboard__body">
        <div class="dashboard__content">
        <section class="panel" data-section="overview">
            <h2 class="panel__title">system overview</h2>
            <div class="panel__content"></div>
        </section>
        <section class="panel" data-section="providers">
            <h2 class="panel__title">provider endpoints</h2>
            <div class="panel__content"></div>
        </section>
        <section class="panel" data-section="capabilities">
            <h2 class="panel__title">supported flows</h2>
            <div class="panel__content"></div>
        </section>
        <section class="panel" data-section="diagnostics">
            <h2 class="panel__title">diagnostics</h2>
            <div class="panel__content"></div>
        </section>
        </div>
    </main>
    <footer class="dashboard__footer">
        curated for the x402 facilitator · <a href="https://daydreams.systems" target="_blank" rel="noopener">daydreams.systems</a>
    </footer>
    </div>
</div>
<script>
(function initWebGLBackground() {
    if (typeof window === 'undefined' || typeof document === 'undefined') {
        return;
    }

    const canvas = document.createElement('canvas');
    canvas.dataset.role = 'bg-canvas';
    canvas.setAttribute('aria-hidden', 'true');
    document.body.prepend(canvas);

    const gl = canvas.getContext('webgl', {
        antialias: false,
        preserveDrawingBuffer: false,
        depth: false,
        stencil: false,
    });

    if (!gl) {
        canvas.remove();
        return;
    }

    const vertexSource = `
        attribute vec2 position;
        varying vec2 v_uv;

        void main() {
            v_uv = (position + 1.0) * 0.5;
            gl_Position = vec4(position, 0.0, 1.0);
        }
    `;

    const fragmentSource = `
        precision mediump float;

        uniform vec2 u_resolution;
        uniform float u_time;
        uniform float u_cellSize;
        uniform float u_noiseScale;

        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);

            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));

            vec2 u = f * f * (3.0 - 2.0 * f);

            return mix(a, b, u.x) +
                (c - a) * u.y * (1.0 - u.x) +
                (d - b) * u.x * u.y;
        }

        void main() {
            vec2 frag = gl_FragCoord.xy;
            float cellSize = max(8.0, u_cellSize);
            vec2 cellId = floor(frag / cellSize);
            vec2 cellUv = fract(frag / cellSize);

            vec2 drift = vec2(u_time * 0.24, u_time * -0.18);
            float n = noise(cellId * u_noiseScale + drift);
            float n2 = noise((cellId + vec2(11.0, 17.0)) * (u_noiseScale * 2.8) + vec2(u_time * -0.32, u_time * 0.26));
            float hue = fract(n + n2 * 0.45 + u_time * 0.08);

            vec3 low = vec3(0.025, 0.08, 0.035);
            vec3 high = vec3(0.12, 0.95, 0.38);
            vec3 base = mix(low, high, hue);

            vec2 center = abs(cellUv - 0.5) * 2.0;
            float edgeSoft = pow(1.0 - clamp(max(center.x, center.y), 0.0, 1.0), 2.0);
            float sparkle = noise(cellId * (u_noiseScale * 6.4) + vec2(u_time * 0.42, u_time * -0.33));

            vec3 color = base;
            color *= 0.68 + 0.32 * edgeSoft;
            color += (sparkle - 0.5) * vec3(0.02, 0.25, 0.06);
            color = clamp(color, 0.0, 1.0);

            gl_FragColor = vec4(color, 1.0);
        }
    `;

    const compileShader = (type, source) => {
        const shader = gl.createShader(type);
        if (!shader) {
            return null;
        }
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('webgl shader compile error:', gl.getShaderInfoLog(shader) || 'unknown');
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    };

    const createProgram = (vsSource, fsSource) => {
        const vertexShader = compileShader(gl.VERTEX_SHADER, vsSource);
        const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fsSource);
        if (!vertexShader || !fragmentShader) {
            return null;
        }
        const program = gl.createProgram();
        if (!program) {
            return null;
        }
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('webgl program link error:', gl.getProgramInfoLog(program) || 'unknown');
            gl.deleteProgram(program);
            return null;
        }
        gl.deleteShader(vertexShader);
        gl.deleteShader(fragmentShader);
        return program;
    };

    const program = createProgram(vertexSource, fragmentSource);
    if (!program) {
        canvas.remove();
        return;
    }

    const positionLocation = gl.getAttribLocation(program, 'position');
    const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
    const timeLocation = gl.getUniformLocation(program, 'u_time');
    const cellSizeLocation = gl.getUniformLocation(program, 'u_cellSize');
    const noiseScaleLocation = gl.getUniformLocation(program, 'u_noiseScale');

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

    gl.disable(gl.DEPTH_TEST);
    gl.disable(gl.CULL_FACE);
    gl.disable(gl.BLEND);
    gl.clearColor(0.0, 0.0, 0.0, 1.0);

    let animationFrame = 0;
    let cellSize = 24;
    let noiseScale = 0.08;

    const resize = () => {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const width = Math.max(1, Math.floor(window.innerWidth * dpr));
        const height = Math.max(1, Math.floor(window.innerHeight * dpr));

        if (canvas.width !== width || canvas.height !== height) {
            canvas.width = width;
            canvas.height = height;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
        }

        gl.viewport(0, 0, width, height);

        const maxDim = Math.max(width, height);
        cellSize = Math.max(8, Math.min(64, maxDim / 144));
        noiseScale = 1.0 / Math.max(12, cellSize) * 48.0;
    };

    const render = (timestamp) => {
        animationFrame = window.requestAnimationFrame(render);
        resize();

        const time = timestamp * 0.001;

        gl.useProgram(program);
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        gl.uniform1f(timeLocation, time);
        gl.uniform1f(cellSizeLocation, cellSize);
        gl.uniform1f(noiseScaleLocation, noiseScale);

        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
    };

    const handleResize = () => {
        resize();
    };

    window.addEventListener('resize', handleResize, { passive: true });
    window.addEventListener('orientationchange', handleResize, { passive: true });

    resize();
    animationFrame = window.requestAnimationFrame(render);
})();
(function () {
    const state = {
        phase: 'loading',
        payload: null,
        error: null,
        lastSuccess: null,
    };

    const selectors = {
        status: document.querySelector('[data-role="status-indicator"]'),
        statusLabel: document.querySelector('[data-role="status-label"]'),
        statusTime: document.querySelector('[data-role="status-time"]'),
        sections: new Map(),
    };

    document.querySelectorAll('[data-section]').forEach((section) => {
        const content = section.querySelector('.panel__content');
        if (section.dataset.section && content) {
            selectors.sections.set(section.dataset.section, content);
        }
    });

    const coerceToMs = (value) => {
        const numeric = Number(value);
        if (!Number.isFinite(numeric) || numeric <= 0) {
            return null;
        }
        if (numeric > 1e12) {
            return numeric;
        }
        if (numeric > 1e9) {
            return numeric * 1000;
        }
        return numeric;
    };

    const formatTimestamp = (value) => {
        const ms = coerceToMs(value);
        if (!ms) {
            return '—';
        }
        return new Date(ms).toISOString();
    };

    const createRow = (key, value, options = {}) => {
        const row = document.createElement('div');
        row.className = 'row' + (options.stacked ? ' row--stacked' : '');

        const keyEl = document.createElement('span');
        keyEl.className = 'row__key';
        keyEl.textContent = key;
        row.append(keyEl);

        const valueEl = document.createElement('span');
        valueEl.className = 'row__value';
        valueEl.textContent = value ?? '—';
        row.append(valueEl);

        if (options.meta) {
            const metaEl = document.createElement('span');
            metaEl.className = 'row__meta';
            metaEl.textContent = options.meta;
            row.append(metaEl);
        }

        return row;
    };

    const createMessage = (text) => {
        const message = document.createElement('p');
        message.className = 'message';
        message.textContent = text;
        return message;
    };

    const ensureNodes = (value) => {
        if (!value) {
            return [];
        }
        if (Array.isArray(value)) {
            return value;
        }
        return [value];
    };

    const updateStatusIndicator = (context) => {
        const { phase, payload, error, lastSuccess } = context;
        if (!selectors.status) {
            return;
        }
        selectors.status.dataset.phase = phase;

        const label = phase === 'ready' ? 'online' : phase === 'error' && payload ? 'degraded' : phase === 'error' ? 'offline' : 'loading';
        if (selectors.statusLabel) {
            selectors.statusLabel.textContent = label;
        }

        const heartbeat = payload?.generatedAt ?? lastSuccess;
        if (selectors.statusTime) {
            selectors.statusTime.textContent = heartbeat ? formatTimestamp(heartbeat) : '—';
        }

        if (error && phase === 'error' && selectors.status) {
            selectors.status.title = error;
        } else if (selectors.status) {
            selectors.status.removeAttribute('title');
        }
    };

    const sectionRenderers = {
        overview(context) {
            const { phase, payload, error, lastSuccess } = context;
            const nodes = [];
            const hasData = Boolean(payload);

            if (phase === 'loading' && !hasData) {
                nodes.push(createMessage('Boot sequence running. Awaiting first heartbeat...'));
                return nodes;
            }

            const statusLabel = phase === 'error' ? (hasData ? 'degraded' : 'offline') : 'online';
            nodes.push(createRow('status', statusLabel));
            nodes.push(createRow('heartbeat', payload?.generatedAt ? formatTimestamp(payload.generatedAt) : '—'));
            nodes.push(createRow('providers', Array.isArray(payload?.providers) ? String(payload.providers.length) : '0'));
            nodes.push(createRow('capabilities', Array.isArray(payload?.supported) ? String(payload.supported.length) : '0'));

            if (phase === 'error' && error) {
                nodes.push(createMessage(`alert: ${error}`));
            }

            if (lastSuccess && phase === 'error') {
                nodes.push(createRow('last ok', new Date(lastSuccess).toISOString()));
            }

            return nodes;
        },
        providers(context) {
            const { phase, payload, error } = context;
            if (phase === 'error' && !payload) {
                return [createMessage(`unavailable: ${error || 'connection failed'}`)];
            }

            const providers = Array.isArray(payload?.providers) ? payload.providers : [];
            if (!providers.length) {
                return [createMessage('no provider endpoints configured.')];
            }

            return providers.map((provider, index) => {
                const label = provider?.network ? `${provider.network}` : `provider #${index + 1}`;
                const metaParts = [];
                if (provider?.status) {
                    metaParts.push(`status ${provider.status}`);
                }
                if (provider?.latency !== undefined && provider.latency !== null) {
                    metaParts.push(`latency ${provider.latency}ms`);
                }
                if (provider?.height !== undefined && provider.height !== null) {
                    metaParts.push(`height ${provider.height}`);
                }

                return createRow(label, provider?.address ?? '—', {
                    stacked: true,
                    meta: metaParts.length ? metaParts.join(' • ') : null,
                });
            });
        },
        capabilities(context) {
            const { phase, payload, error } = context;
            if (phase === 'error' && !payload) {
                return [createMessage(`unavailable: ${error || 'connection failed'}`)];
            }

            const supported = Array.isArray(payload?.supported) ? payload.supported : [];
            if (!supported.length) {
                return [createMessage('no supported flows reported.')];
            }

            return supported.map((entry, index) => {
                const label = entry?.network ? `${entry.network}` : `flow #${index + 1}`;
                const valueParts = [];
                if (entry?.x402Version) {
                    valueParts.push(`v${entry.x402Version}`);
                }
                if (entry?.scheme) {
                    valueParts.push(entry.scheme);
                }
                const metaParts = [];
                if (entry?.extra?.feePayer) {
                    metaParts.push(`fee payer ${entry.extra.feePayer}`);
                }
                if (entry?.access) {
                    metaParts.push(`access ${entry.access}`);
                }

                return createRow(label, valueParts.length ? valueParts.join(' · ') : 'ready', {
                    stacked: true,
                    meta: metaParts.length ? metaParts.join(' • ') : null,
                });
            });
        },
        diagnostics(context) {
            const { phase, error, lastSuccess } = context;
            const nodes = [];
            nodes.push(createRow('refresh cadence', '5s'));
            nodes.push(createRow('phase', phase));
            if (lastSuccess) {
                nodes.push(createRow('last success', new Date(lastSuccess).toISOString()));
            }
            if (error) {
                nodes.push(createMessage(`last error: ${error}`));
            }
            return nodes;
        },
    };

    const renderSections = () => {
        const context = { ...state };
        updateStatusIndicator(context);

        sectionRenderersKeys.forEach((id) => {
            const renderSection = sectionRenderers[id];
            const container = selectors.sections.get(id);
            if (!container) {
                return;
            }
            const nodes = ensureNodes(renderSection(context));
            if (nodes.length) {
                container.replaceChildren(...nodes);
            } else {
                container.replaceChildren(createMessage('no data.'));
            }
        });
    };

    const sectionRenderersKeys = Object.keys(sectionRenderers);

    const refreshStatus = async () => {
        if (!state.payload) {
            state.phase = 'loading';
            renderSections();
        }

        try {
            const response = await fetch('/landing/status', { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`http ${response.status}`);
            }
            const payload = await response.json();
            state.phase = 'ready';
            state.payload = payload;
            state.error = null;
            state.lastSuccess = Date.now();
        } catch (err) {
            const message = err instanceof Error ? err.message : String(err);
            state.phase = 'error';
            state.error = message;
        } finally {
            renderSections();
        }
    };

    renderSections();
    refreshStatus();
    setInterval(refreshStatus, 5000);
})();
</script>
</body>
</html>
